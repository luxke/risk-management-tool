<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<style>

body{

    margin:0;
    padding:30px;
    background:#f4f6f9;

    font-family:Segoe UI,Arial,sans-serif;

}

.wrapper{

    max-width:700px;

    margin:auto;

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.header{

    background:#146c43;

    color:white;

    padding:35px;

    text-align:center;

}

.header h1{

    margin:0;

    font-size:28px;

}

.header p{

    margin-top:10px;

    color:#d9f2e3;

}

.content{

    padding:40px;

    color:#444;

    line-height:1.8;

}

.info-box{

    background:#f8f9fa;

    border-left:5px solid #198754;

    padding:20px;

    margin:25px 0;

    border-radius:8px;

}

.info-box table{

    width:100%;

}

.info-box td{

    padding:8px;

}

.button{

    display:inline-block;

    margin-top:25px;

    padding:14px 30px;

    background:#198754;

    color:white !important;

    text-decoration:none;

    border-radius:8px;

    font-weight:bold;

}

.footer{

    background:#f4f6f9;

    text-align:center;

    padding:25px;

    font-size:13px;

    color:#777;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="header">

<h1>

Risk Management System

</h1>

<p>

Official Notification

</p>

</div>

<div class="content">

{{ body|safe }}

</div>

<div class="footer">

<strong>Risk Management System</strong>

<br><br>

This is an automated email.

Please do not reply.

<br><br>

© 2026 All Rights Reserved

</div>

</div>

</body>

</html>
