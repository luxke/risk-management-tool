{% extends "base.html" %}

{% block title %}
Add Category
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <h4>Add New Category</h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Category Name

                        </label>

                        <input
                            type="text"
                            name="category_name"
                            class="form-control"
                            placeholder="Enter category name"
                            required>

                    </div>

                    <button class="btn btn-success">

                        Save Category

                    </button>

                    <a href="/categories"
                       class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
