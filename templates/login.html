<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risk Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, Helvetica, sans-serif;

    background:linear-gradient(
        135deg,
        #0b4f2d,
        #1d7c45,
        #dfeedd
    );

    overflow:hidden;

}

/* Background Logo */

body::before{

    content:"";

    position:absolute;

    width:700px;
    height:700px;

    background:url("{{ url_for('static', filename='images/institution_logo.png') }}");

    background-repeat:no-repeat;
    background-position:center;
    background-size:contain;

    opacity:.08;

    z-index:0;

}

/* Login Card */

.login-card{

    position:relative;

    z-index:2;

    width:430px;

    background:rgba(255,255,255,.92);

    backdrop-filter:blur(12px);

    border-radius:18px;

    padding:35px;

    box-shadow:
        0 20px 45px rgba(0,0,0,.25);

}

.logo{

    width:110px;

    display:block;

    margin:auto;

}

.system-title{

    text-align:center;

    color:#0b4f2d;

    font-weight:bold;

    margin-top:15px;

}

.subtitle{

    text-align:center;

    color:gray;

    margin-bottom:25px;

    font-size:14px;

}

.form-control{

    border-radius:10px;

    padding:12px;

}

.form-control:focus{

    border-color:#198754;

    box-shadow:0 0 8px rgba(25,135,84,.3);

}

.btn-login{

    background:#198754;

    color:white;

    font-weight:bold;

    border-radius:10px;

    padding:12px;

    transition:.3s;

}

.btn-login:hover{

    background:#146c43;

}

.footer{

    text-align:center;

    margin-top:20px;

    font-size:13px;

    color:#666;

}

.login-card{

    animation:fadeIn .8s ease;

}

@keyframes fadeIn{

from{

    opacity:0;
    transform:translateY(30px);

}

to{

    opacity:1;
    transform:translateY(0);

}

}

#togglePassword{

    border-radius:0 12px 12px 0;

    border:1px solid #ced4da;

    border-left:none;

    background:white;

}

#togglePassword:hover{

    background:#198754;

    color:white;

}

#togglePassword:focus{

    box-shadow:none;

}

</style>

</head>

<body>

<div class="login-card">

    <img
        src="{{ url_for('static', filename='images/institution_logo.png') }}"
        class="logo">

    <h3 class="system-title">

        Risk Management System

    </h3>

    <p class="subtitle">

        Secure Access Portal

    </p>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">

                Email Address

            </label>

            <input
                type="email"
                class="form-control"
                name="email"
                placeholder="Enter your email"
                required>

        </div>

        <div class="mb-4">

    <label class="form-label">

        Password

    </label>

    <div class="input-group">

        <span class="input-group-text">

            <i class="bi bi-lock-fill"></i>

        </span>

        <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Enter your password"
            required>

        <button
            class="btn btn-outline-secondary"
            type="button"
            id="togglePassword">

            <i class="bi bi-eye-fill" id="eyeIcon"></i>

        </button>

    </div>

</div>

        <button class="btn btn-login w-100">

            Login

        </button>

    </form>

    <div class="footer">

        Risk Management System<br>

        © 2026 All Rights Reserved 

    </div>

</div>

<script>

const password = document.getElementById("password");

const togglePassword = document.getElementById("togglePassword");

const eyeIcon = document.getElementById("eyeIcon");

togglePassword.addEventListener("click", function(){

    if(password.type === "password"){

        password.type = "text";

        eyeIcon.classList.remove("bi-eye-fill");
        eyeIcon.classList.add("bi-eye-slash-fill");

    }else{

        password.type = "password";

        eyeIcon.classList.remove("bi-eye-slash-fill");
        eyeIcon.classList.add("bi-eye-fill");

    }

});

</script>

</body>

</html>
