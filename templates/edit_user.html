<!DOCTYPE html>
<html>
<head>

<title>Edit User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">

<h3>Edit User</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Full Name</label>

<input
class="form-control"
name="full_name"
value="{{ user.full_name }}">

</div>

<div class="mb-3">

<label>Email</label>

<input
class="form-control"
name="email"
value="{{ user.email }}">

</div>

<div class="mb-3">

<label>Role</label>

<select name="role" class="form-control">

<option {% if user.role=="Employee" %}selected{% endif %}>
Employee
</option>

<option {% if user.role=="Risk Manager" %}selected{% endif %}>
Risk Manager
</option>

<option {% if user.role=="Admin" %}selected{% endif %}>
Admin
</option>

</select>

</div>

<div class="mb-3">

<label>Department</label>

<select
name="department_id"
class="form-control">

{% for department in departments %}

<option
value="{{ department.department_id }}"
{% if department.department_id == user.department_id %}
selected
{% endif %}
>

{{ department.department_name }}

</option>

{% endfor %}

</select>

</div>

<button class="btn btn-success">

Save Changes

</button>

<a href="/users"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>
</html>
