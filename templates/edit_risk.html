{% extends "base.html" %}

{% block title %}
Edit Risk
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header bg-warning text-dark">

<h3 class="mb-0">Edit Risk</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">Risk Title</label>

<input
type="text"
name="Tittle"
class="form-control"
value="{{ risk.Tittle }}"
required>

</div>

<div class="mb-3">

<label class="form-label">Description</label>

<textarea
name="description"
rows="4"
class="form-control"
required>{{ risk.Description }}</textarea>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Department</label>

<select
name="department_id"
class="form-select"
required>

{% for department in departments %}

<option
value="{{ department.department_id }}"
{% if department.department_id == risk.department_id %}selected{% endif %}>

{{ department.department_name }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Category</label>

<select
name="category_id"
class="form-select"
required>

{% for category in categories %}

<option
value="{{ category.category_id }}"
{% if category.category_id == risk.category_id %}selected{% endif %}>

{{ category.category_name }}

</option>

{% endfor %}

</select>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Probability</label>

<select
name="probability"
class="form-select"
required>

{% for i in range(1,6) %}

<option
value="{{ i }}"
{% if i == risk.Probability %}selected{% endif %}>

{{ i }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Impact</label>

<select
name="impact"
class="form-select"
required>

{% for i in range(1,6) %}

<option
value="{{ i }}"
{% if i == risk.Impact %}selected{% endif %}>

{{ i }}

</option>

{% endfor %}

</select>

</div>

</div>

<div class="d-flex justify-content-end">

<a href="/" class="btn btn-secondary me-2">

Cancel

</a>

<button
type="submit"
class="btn btn-warning">

Update Risk

</button>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
