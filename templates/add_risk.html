<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Risk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Add New Risk</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Risk Tittle</label>
            <input
                type="text"
                class="form-control"
                name="Tittle"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>

            <textarea
                class="form-control"
                rows="4"
                name="description"
                required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Probability</label>

            <input
                type="number"
                min="1"
                max="10"
                class="form-control"
                name="probability"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Impact</label>

            <input
                type="number"
                min="1"
                max="10"
                class="form-control"
                name="impact"
                required>
        </div>

        <button class="btn btn-primary">
            Save Risk
        </button>

    </form>

</div>

</body>
</html>
