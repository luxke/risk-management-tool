<!DOCTYPE html>
<html>

<head>

    <title>Add User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Create User</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>Full Name</label>

                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Password</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Role</label>

                    <select
                        name="role"
                        class="form-control">

                        <option>Employee</option>

                        <option>Risk Manager</option>

                        <option>Admin</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label>Department</label>

                    <select
                        name="department_id"
                        class="form-control">

                        {% for department in departments %}

                        <option value="{{ department.department_id }}">

                            {{ department.department_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <button class="btn btn-success">

                    Create User

                </button>

                <a href="/users"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
