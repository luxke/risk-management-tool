```html
{% extends "base.html" %}

{% block title %}
Assign Risk
{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h4>Assign Risk to Employee</h4>

</div>

<div class="card-body">

<div class="mb-4">

<h5>{{ risk.Tittle }}</h5>

<p class="text-muted">
{{ risk.Description }}
</p>

<hr>

<div class="row">

<div class="col-md-6">

<strong>Department:</strong><br>

{{ session["department_name"] }}

</div>

<div class="col-md-6">

<strong>Current Status:</strong><br>

<span class="badge bg-warning text-dark">

{{ risk.status }}

</span>

</div>

</div>

</div>

<form method="POST">

<div class="mb-3">

<label class="form-label">

Assign Employee

</label>

<select
name="owner_id"
class="form-select"
required>

<option value="">

-- Select Employee --

</option>

{% for employee in employees %}

<option value="{{ employee.user_id }}">

{{ employee.full_name }}

</option>

{% endfor %}

</select>

</div>

<div class="d-flex gap-2">

<button
type="submit"
class="btn btn-success">

Assign Risk

</button>

<a
href="/"
class="btn btn-secondary">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
```
